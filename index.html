<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Finance Tracker Login - Sign in with your Google account" />
  <meta name="theme-color" content="#667eea" />
  <title>Login - Finance Tracker</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      background:
        radial-gradient(circle at top left, rgba(45, 212, 191, 0.2), transparent 26rem),
        radial-gradient(circle at 90% 15%, rgba(59, 130, 246, 0.16), transparent 24rem),
        var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-page {
      background: var(--surface-raised);
      border: 2px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      padding: 40px;
      max-width: 400px;
      width: 100%;
    }

    .login-page h1 {
      text-align: center;
      color: var(--text);
      margin: 0 0 10px;
      font-size: 1.8rem;
    }

    .login-subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .login-form button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      border: 2px solid color-mix(in srgb, var(--primary) 60%, var(--border));
      border-radius: var(--radius-md);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 5px 0 rgba(24, 34, 48, 0.14);
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
    }

    .login-form button:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 0 rgba(24, 34, 48, 0.12);
    }

    .login-form button:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 rgba(24, 34, 48, 0.18);
    }

    #message {
      margin-top: 20px;
      padding: 12px;
      border-radius: var(--radius-md);
      text-align: center;
      display: none;
      font-weight: 500;
    }

    #message.error {
      background: var(--danger-light);
      color: var(--danger);
      border: 1px solid var(--danger-lighter);
    }

    #message.success {
      background: var(--primary-light);
      color: var(--primary-strong);
      border: 1px solid var(--primary);
    }

    .loading {
      display: none;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .loading.active {
      display: block;
    }
  </style>
</head>
<body>
  <main class="login-page">
    <h1>Finance Tracker</h1>
    <p class="login-subtitle">Sign in with Google to continue</p>

    <form class="login-form" id="login-form" aria-labelledby="h1">
      <button type="button" id="google-button" aria-label="Sign in with Google">
        Sign in with Google
      </button>
      <div id="message" role="alert" aria-live="polite"></div>
      <div class="loading" id="loading-spinner" aria-hidden="true">
        Loading...
      </div>
    </form>
  </main>

  <script type="module">
    import { auth, provider } from './firebase-config.js';
    import { signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';

    const messageEl = document.getElementById('message');
    const button = document.getElementById('google-button');
    const loadingSpinner = document.getElementById('loading-spinner');

    /**
     * Display message to user
     * @param {string} text - Message text
     * @param {string} type - Message type ('error' or 'success')
     */
    function showMessage(text, type) {
      if (messageEl) {
        messageEl.textContent = text;
        messageEl.className = `message ${type}`;
        messageEl.style.display = 'block';
      }
    }

    /**
     * Show/hide loading state
     * @param {boolean} isLoading - Whether to show loading state
     */
    function setLoading(isLoading) {
      if (button) {
        button.disabled = isLoading;
      }
      if (loadingSpinner) {
        loadingSpinner.classList.toggle('active', isLoading);
      }
    }

    // Handle Google sign-in click
    if (button) {
      button.addEventListener('click', async () => {
        try {
          setLoading(true);
          messageEl.style.display = 'none';
          
          await signInWithPopup(auth, provider);
          // Navigation will happen via onAuthStateChanged below
        } catch (error) {
          // Handle specific error codes
          if (error.code === 'auth/popup-closed-by-user') {
            showMessage('Sign-in popup was closed', 'error');
          } else if (error.code === 'auth/popup-blocked') {
            showMessage('Please allow popups for this site', 'error');
          } else {
            showMessage(error.message || 'Sign-in failed. Please try again.', 'error');
          }
          setLoading(false);
        }
      });
    }

    // Monitor auth state and redirect on successful login
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = 'tracker.html';
      } else {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
