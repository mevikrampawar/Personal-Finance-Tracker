<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Finance Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 400px;
      width: 100%;
    }
    h1 {
      text-align: center;
      color: #2a4d7f;
      margin: 0 0 10px;
      font-size: 1.8rem;
    }
    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d7e0;
      border-radius: 8px;
      font-size: 1rem;
      box-sizing: border-box;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #5568d3;
    }
    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      display: none;
    }
    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .link {
      text-align: center;
      margin-top: 20px;
      color: #666;
    }
    .link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }
    .link a:hover {
      text-decoration: underline;
    }
    .password-strength {
      margin-top: 4px;
      font-size: 0.85rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Finance Tracker</h1>
    <div class="subtitle">Create a new account</div>

    <form id="register-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Choose a username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create a password" required />
        <div class="password-strength">Minimum 4 characters</div>
      </div>
      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" placeholder="Confirm password" required />
      </div>
      <button type="submit">Register</button>
    </form>

    <div id="message" class="message"></div>

    <div class="link">
      Already have an account? <a href="login.html">Login here</a>
    </div>
  </div>

  <script>
    // Get stored users
    function getUsers() {
      const users = localStorage.getItem('users');
      return users ? JSON.parse(users) : {};
    }

    // Save users
    function saveUsers(users) {
      localStorage.setItem('users', JSON.stringify(users));
    }

    // Show message
    function showMessage(text, type) {
      const msgEl = document.getElementById('message');
      msgEl.textContent = text;
      msgEl.className = `message ${type}`;
      msgEl.style.display = 'block';
    }

    // Handle registration
    document.getElementById('register-form').addEventListener('submit', (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const users = getUsers();

      // Validation
      if (!username || !password || !confirm) {
        showMessage('Please fill in all fields', 'error');
        return;
      }

      if (username.length < 3) {
        showMessage('Username must be at least 3 characters', 'error');
        return;
      }

      if (users[username]) {
        showMessage('Username already exists. Please choose a different one', 'error');
        return;
      }

      if (password.length < 4) {
        showMessage('Password must be at least 4 characters', 'error');
        return;
      }

      if (password !== confirm) {
        showMessage('Passwords do not match', 'error');
        return;
      }

      // Register user
      users[username] = password;
      saveUsers(users);

      // Initialize empty transactions for new user
      localStorage.setItem(`transactions_${username}`, JSON.stringify([]));

      // Login and redirect
      localStorage.setItem('currentUser', username);
      showMessage('Registration successful! Redirecting...', 'success');
      
      setTimeout(() => {
        window.location.href = 'tracker.html';
      }, 1500);
    });

    // Check if already logged in
    if (localStorage.getItem('currentUser')) {
      window.location.href = 'tracker.html';
    }
  </script>
</body>
</html>
