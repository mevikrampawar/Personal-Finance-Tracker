<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="navbar">
    <div class="navbar-content">
      <div class="navbar-left">
        <div>
          <h1>💰 Finance Tracker</h1>
          <div class="meta">Track income and expenses with a calm, cozy dashboard</div>
        </div>
      </div>
      <div class="navbar-user">
        <span>Welcome, <strong id="username-display"></strong></span>
        <div class="button-group">
          <button id="theme-toggle" class="theme-btn">Dark Mode</button>
          <button id="logout-button" class="logout-btn">Logout</button>
        </div>
      </div>
    </div>
  </div>

  <div class="container">
    <!-- Summary Cards -->
    <div class="totals">
      <div class="total-card">
        <div class="total-card-label">Total Income</div>
        <div class="total-card-amount" id="income-total">$0.00</div>
      </div>
      <div class="total-card">
        <div class="total-card-label">Total Expenses</div>
        <div class="total-card-amount" id="expense-total">$0.00</div>
      </div>
      <div class="total-card">
        <div class="total-card-label">Balance</div>
        <div class="total-card-amount" id="balance-total">$0.00</div>
      </div>
    </div>

    <!-- Add Transaction Form -->
    <div class="card">
      <h2>Add New Transaction</h2>
      <form id="transaction-form">
        <div class="form-row">
          <div class="form-group">
            <label for="description">Description</label>
            <input type="text" id="description" placeholder="e.g., Grocery, Salary" required />
          </div>
          <div class="form-group">
            <label>Type</label>
            <div class="radio-row">
              <label class="radio-option">
                <input type="radio" name="transaction-type" value="expense" checked />
                <span>Expense</span>
              </label>
              <label class="radio-option">
                <input type="radio" name="transaction-type" value="income" />
                <span>Income</span>
              </label>
            </div>
          </div>
          <div class="form-group">
            <label for="amount">Amount</label>
            <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" required />
          </div>
        </div>
        <button type="submit">Add Transaction</button>
      </form>
    </div>

    <!-- Transaction History -->
    <div class="card">
      <h2>Transaction History</h2>
      <table>
        <thead>
          <tr>
            <th>Description</th>
            <th>Type</th>
            <th>Amount</th>
          </tr>
        </thead>
        <tbody id="transaction-table">
          <tr>
            <td colspan="3">
              <div class="empty-state">
                <div class="empty-state-icon">📭</div>
                <div>No transactions yet. Add one to get started!</div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
    import {
      collection,
      query,
      orderBy,
      addDoc,
      serverTimestamp,
      onSnapshot
    } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js';

    let currentUser = null;
    let transactions = [];
    let unsubscribe = null;

    function setTheme(theme) {
      document.body.classList.toggle('dark', theme === 'dark');
      const button = document.getElementById('theme-toggle');
      button.textContent = theme === 'dark' ? 'Light Mode' : 'Dark Mode';
      localStorage.setItem('finance-theme', theme);
    }

    function initTheme() {
      const savedTheme = localStorage.getItem('finance-theme') || 'light';
      setTheme(savedTheme);
      document.getElementById('theme-toggle').addEventListener('click', () => {
        const nextTheme = document.body.classList.contains('dark') ? 'light' : 'dark';
        setTheme(nextTheme);
      });
    }

    // Initialize app
    function initApp() {
      initTheme();
      onAuthStateChanged(auth, (user) => {
        if (!user) {
          window.location.href = 'login.html';
          return;
        }

        currentUser = user;
        document.getElementById('username-display').textContent = user.displayName || user.email;
        loadTransactions();
      });
    }

    // Format currency
    function formatCurrency(value) {
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD'
      }).format(value);
    }

    // Load transactions from Firestore
    function loadTransactions() {
      const transactionsRef = collection(db, 'users', currentUser.uid, 'transactions');
      const q = query(transactionsRef, orderBy('createdAt', 'desc'));

      if (unsubscribe) {
        unsubscribe();
      }

      unsubscribe = onSnapshot(q, (snapshot) => {
        transactions = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderTransactions();
        updateTotals();
      }, (error) => {
        alert('Unable to load transactions: ' + error.message);
      });
    }

    // Update summary totals
    function updateTotals() {
      const incomeTotal = transactions
        .filter(t => t.type === 'income')
        .reduce((sum, t) => sum + t.amount, 0);
      const expenseTotal = transactions
        .filter(t => t.type === 'expense')
        .reduce((sum, t) => sum + t.amount, 0);
      const balance = incomeTotal - expenseTotal;

      document.getElementById('income-total').textContent = formatCurrency(incomeTotal);
      document.getElementById('expense-total').textContent = formatCurrency(expenseTotal);
      document.getElementById('balance-total').textContent = formatCurrency(balance);
    }

    // Render transaction table
    function renderTransactions() {
      const tableBody = document.getElementById('transaction-table');

      if (transactions.length === 0) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="3">
              <div class="empty-state">
                <div class="empty-state-icon">📭</div>
                <div>No transactions yet. Add one to get started!</div>
              </div>
            </td>
          </tr>
        `;
        return;
      }

      tableBody.innerHTML = transactions.map(transaction => `
        <tr>
          <td>${transaction.description}</td>
          <td>${transaction.type === 'income' ? '📈 Income' : '📉 Expense'}</td>
          <td>${formatCurrency(transaction.amount)}</td>
        </tr>
      `).join('');
    }

    // Handle form submission
    document.getElementById('transaction-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const description = document.getElementById('description').value.trim();
      const type = document.querySelector('input[name="transaction-type"]:checked').value;
      const amount = parseFloat(document.getElementById('amount').value);

      if (!description || amount <= 0) {
        alert('Please fill in all fields with valid values');
        return;
      }

      const transactionsRef = collection(db, 'users', currentUser.uid, 'transactions');
      await addDoc(transactionsRef, {
        description,
        type,
        amount,
        createdAt: serverTimestamp()
      });

      document.getElementById('transaction-form').reset();
    });

    // Logout function
    async function logout() {
      const confirmLogout = confirm('Are you sure you want to logout?');
      if (!confirmLogout) return;

      try {
        await signOut(auth);
        window.location.href = 'login.html';
      } catch (error) {
        alert('Logout failed: ' + error.message);
      }
    }

    document.getElementById('logout-button').addEventListener('click', logout);
    initApp();
  </script>
</body>
</html>
