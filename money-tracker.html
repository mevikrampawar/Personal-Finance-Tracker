<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Finance Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      color: #1d1d1d;
      background: #f7f9fc;
    }
    h1 {
      text-align: center;
      margin-bottom: 0.5rem;
      color: #2a4d7f;
    }
    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.08);
      padding: 24px;
      margin-bottom: 24px;
    }
    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 600;
    }
    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d7e0;
      border-radius: 8px;
      font-size: 1rem;
      box-sizing: border-box;
    }
    button {
      margin-top: 16px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #2a4d7f;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover {
      background: #1f3a61;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }
    th, td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid #e4e8ef;
    }
    th {
      background: #f0f4fb;
      color: #2a4d7f;
    }
    .totals {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .total-card {
      flex: 1;
      min-width: 180px;
      background: #eef3fb;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }
    .total-card strong {
      display: block;
      margin-top: 10px;
      font-size: 1.4rem;
    }
  </style>
</head>
<body>
  <h1>Simple Finance Tracker</h1>

  <div class="card">
    <form id="transaction-form">
      <label for="description">Description</label>
      <input type="text" id="description" placeholder="e.g. Grocery, Salary" required />

      <label for="type">Type</label>
      <select id="type">
        <option value="expense">Expense</option>
        <option value="income">Income</option>
      </select>

      <label for="amount">Amount</label>
      <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" required />

      <button type="submit">Add Transaction</button>
    </form>
  </div>

  <div class="card totals">
    <div class="total-card">
      <div>Total Income</div>
      <strong id="income-total">$0.00</strong>
    </div>
    <div class="total-card">
      <div>Total Expense</div>
      <strong id="expense-total">$0.00</strong>
    </div>
    <div class="total-card">
      <div>Balance</div>
      <strong id="balance-total">$0.00</strong>
    </div>
  </div>

  <div class="card">
    <h2>Transaction History</h2>
    <table>
      <thead>
        <tr>
          <th>Description</th>
          <th>Type</th>
          <th>Amount</th>
        </tr>
      </thead>
      <tbody id="transaction-table">
      </tbody>
    </table>
  </div>

  <script>
    const form = document.getElementById('transaction-form');
    const tableBody = document.getElementById('transaction-table');
    const incomeTotalEl = document.getElementById('income-total');
    const expenseTotalEl = document.getElementById('expense-total');
    const balanceTotalEl = document.getElementById('balance-total');

    let transactions = [];

    function formatCurrency(value) {
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD'
      }).format(value);
    }

    function updateTotals() {
      const incomeTotal = transactions
        .filter(t => t.type === 'income')
        .reduce((sum, t) => sum + t.amount, 0);
      const expenseTotal = transactions
        .filter(t => t.type === 'expense')
        .reduce((sum, t) => sum + t.amount, 0);
      const balance = incomeTotal - expenseTotal;

      incomeTotalEl.textContent = formatCurrency(incomeTotal);
      expenseTotalEl.textContent = formatCurrency(expenseTotal);
      balanceTotalEl.textContent = formatCurrency(balance);
    }

    function renderTransactions() {
      tableBody.innerHTML = '';
      transactions.forEach(transaction => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${transaction.description}</td>
          <td>${transaction.type.charAt(0).toUpperCase() + transaction.type.slice(1)}</td>
          <td>${formatCurrency(transaction.amount)}</td>
        `;
        tableBody.appendChild(row);
      });
    }

    form.addEventListener('submit', event => {
      event.preventDefault();

      const description = document.getElementById('description').value.trim();
      const type = document.getElementById('type').value;
      const amount = parseFloat(document.getElementById('amount').value);

      if (!description || amount <= 0) {
        return;
      }

      transactions.push({ description, type, amount });
      renderTransactions();
      updateTotals();

      form.reset();
    });
  </script>
</body>
</html>
