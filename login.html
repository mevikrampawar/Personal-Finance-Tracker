<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Finance Tracker Login - Sign in with your Google account" />
  <meta name="theme-color" content="#667eea" />
  <title>Login - Finance Tracker</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-page {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 400px;
      width: 100%;
    }

    .login-page h1 {
      text-align: center;
      color: #2a4d7f;
      margin: 0 0 10px;
      font-size: 1.8rem;
    }

    .login-subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .login-form button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .login-form button:hover {
      background: #5568d3;
    }

    .login-form button:active {
      transform: scale(0.98);
    }

    #message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      display: none;
      font-weight: 500;
    }

    #message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    #message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .loading {
      display: none;
      text-align: center;
      color: #666;
      font-size: 0.9rem;
    }

    .loading.active {
      display: block;
    }
  </style>
</head>
<body>
  <main class="login-page">
    <h1>Finance Tracker</h1>
    <p class="login-subtitle">Sign in with Google to continue</p>

    <form class="login-form" id="login-form" aria-labelledby="h1">
      <button type="button" id="google-button" aria-label="Sign in with Google">
        Sign in with Google
      </button>
      <div id="message" role="alert" aria-live="polite"></div>
      <div class="loading" id="loading-spinner" aria-hidden="true">
        Loading...
      </div>
    </form>
  </main>

  <script type="module">
    import { auth, provider } from './firebase-config.js';
    import { signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';

    const messageEl = document.getElementById('message');
    const button = document.getElementById('google-button');
    const loadingSpinner = document.getElementById('loading-spinner');

    /**
     * Display message to user
     * @param {string} text - Message text
     * @param {string} type - Message type ('error' or 'success')
     */
    function showMessage(text, type) {
      if (messageEl) {
        messageEl.textContent = text;
        messageEl.className = `message ${type}`;
        messageEl.style.display = 'block';
      }
    }

    /**
     * Show/hide loading state
     * @param {boolean} isLoading - Whether to show loading state
     */
    function setLoading(isLoading) {
      if (button) {
        button.disabled = isLoading;
      }
      if (loadingSpinner) {
        loadingSpinner.classList.toggle('active', isLoading);
      }
    }

    // Handle Google sign-in click
    if (button) {
      button.addEventListener('click', async () => {
        try {
          setLoading(true);
          messageEl.style.display = 'none';
          
          await signInWithPopup(auth, provider);
          // Navigation will happen via onAuthStateChanged below
        } catch (error) {
          // Handle specific error codes
          if (error.code === 'auth/popup-closed-by-user') {
            showMessage('Sign-in popup was closed', 'error');
          } else if (error.code === 'auth/popup-blocked') {
            showMessage('Please allow popups for this site', 'error');
          } else {
            showMessage(error.message || 'Sign-in failed. Please try again.', 'error');
          }
          setLoading(false);
        }
      });
    }

    // Monitor auth state and redirect on successful login
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = 'tracker.html';
      } else {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
